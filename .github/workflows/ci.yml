name: CI / CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

env:
  NODE_VERSION: '22'

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npm run db:generate --workspace=apps/api

      - name: Lint API
        run: npm run lint --workspace=apps/api

  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test (API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npm run db:generate --workspace=apps/api

      - name: Run API tests
        run: npm run test --workspace=apps/api

  # ── Build ─────────────────────────────────────────────────────────────────
  build-api:
    name: Build (API)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npm run db:generate --workspace=apps/api

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Upload API build artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist/
          retention-days: 1

  build-payment-page:
    name: Build (Payment Page)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build payment-page
        run: npm run build --workspace=apps/payment-page

      - name: Upload payment-page build artifact
        uses: actions/upload-artifact@v4
        with:
          name: payment-page-dist
          path: apps/payment-page/dist/
          retention-days: 1

  build-admin:
    name: Build (Admin)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/master'
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm install

      - name: Build admin
        run: npm run build --workspace=apps/admin

      - name: Upload admin build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: apps/admin/dist/
          retention-days: 1

  # Railway 透過 GitHub webhook 自動偵測 push 並部署，無需在 CI 中執行 railway up
