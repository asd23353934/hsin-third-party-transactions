name: CI / CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  NODE_VERSION: '22'

jobs:
  # ── Lint ──────────────────────────────────────────────────────────────────
  lint:
    name: Lint (API)
    runs-on: ubuntu-latest
    if: |
      contains(github.event.commits[0].modified, 'apps/api') ||
      github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint API
        run: npm run lint --workspace=apps/api

  # ── Test ──────────────────────────────────────────────────────────────────
  test:
    name: Test (API)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run API tests
        run: npm run test --workspace=apps/api

  # ── Build ─────────────────────────────────────────────────────────────────
  build-api:
    name: Build (API)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build API
        run: npm run build --workspace=apps/api

      - name: Upload API build artifact
        uses: actions/upload-artifact@v4
        with:
          name: api-dist
          path: apps/api/dist/
          retention-days: 1

  build-payment-page:
    name: Build (Payment Page)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build payment-page
        run: npm run build --workspace=apps/payment-page

      - name: Upload payment-page build artifact
        uses: actions/upload-artifact@v4
        with:
          name: payment-page-dist
          path: apps/payment-page/dist/
          retention-days: 1

  build-admin:
    name: Build (Admin)
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [test]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build admin
        run: npm run build --workspace=apps/admin

      - name: Upload admin build artifact
        uses: actions/upload-artifact@v4
        with:
          name: admin-dist
          path: apps/admin/dist/
          retention-days: 1

  # ── Deploy API → Railway ───────────────────────────────────────────────────
  deploy-api:
    name: Deploy API → Railway
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    needs: [build-api]
    environment:
      name: production
      url: https://spectra-api.railway.app
    steps:
      - uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy to Railway
        run: railway up --service spectra-api --detach
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
