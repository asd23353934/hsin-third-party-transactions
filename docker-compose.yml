services:
  postgres:
    image: postgres:16-alpine
    container_name: spectra-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: spectra
      POSTGRES_PASSWORD: spectra_dev
      POSTGRES_DB: spectra_db
    ports:
      - "5432:5432"
    volumes:
      - spectra_pgdata:/var/lib/postgresql/data

volumes:
  spectra_pgdata:
